<!DOCTYPE html>
<html>
<head>
  <title>Verification of Actual Temple Images</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #fafafa; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .card { background: white; padding: 10px; border: 1px solid #ccc; border-radius: 8px; text-align: center; }
    img { max-width: 100%; height: 200px; object-fit: cover; border-radius: 4px; display: block; margin: 10px auto; }
  </style>
</head>
<body>
  <h1>Wikimedia Commons Image Loading Verification</h1>
  <div class="grid">
    <div class="card"><h3>Kedarnath</h3><img id="img1" src="https://upload.wikimedia.org/wikipedia/commons/1/1e/Kedarnath_Temple.jpg" /></div>
    <div class="card"><h3>Kashi Vishwanath</h3><img id="img2" src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Kashi_Vishwanath_spire.jpg" /></div>
    <div class="card"><h3>Tirupati Balaji</h3><img id="img3" src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Tirumala_Venkateswara_Temple_Gopuram.jpg" /></div>
    <div class="card"><h3>Meenakshi Amman</h3><img id="img4" src="https://upload.wikimedia.org/wikipedia/commons/f/fe/Madurai_Meenakshi_Amman_Temple_South_Tower.jpg" /></div>
    <div class="card"><h3>Jagannath Puri</h3><img id="img5" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Puri_Jagannath_temple.jpg" /></div>
    <div class="card"><h3>Sun Temple Konark</h3><img id="img6" src="https://upload.wikimedia.org/wikipedia/commons/4/47/Konark_Sun_Temple_2018.jpg" /></div>
    <div class="card"><h3>Brihadeeswarar</h3><img id="img7" src="https://upload.wikimedia.org/wikipedia/commons/f/f0/Brihadisvara_Temple_Thanjavur.jpg" /></div>
    <div class="card"><h3>Golden Temple</h3><img id="img8" src="https://upload.wikimedia.org/wikipedia/commons/d/d4/Golden_Temple_Amritsar_India.jpg" /></div>
    <div class="card"><h3>Somnath</h3><img id="img9" src="https://upload.wikimedia.org/wikipedia/commons/6/67/Somnath_temple_Gujarat_India.jpg" /></div>
  </div>
</body>
</html>
