<!DOCTYPE html>
<html>
<head>
  <title>Verification of Actual Temple Images</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #fafafa; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .card { background: white; padding: 10px; border: 1px solid #ccc; border-radius: 8px; text-align: center; }
    img { max-width: 100%; height: 200px; object-fit: cover; border-radius: 4px; display: block; margin: 10px auto; }
  </style>
</head>
<body>
  <h1>Wikimedia Commons Image Loading Verification</h1>
  <div class="grid">
    <div class="card"><h3>Kedarnath</h3><img id="img1" src="./public/images/kedarnath.png" /></div>
    <div class="card"><h3>Kashi Vishwanath</h3><img id="img2" src="./public/images/kashi_vishwanath.png" /></div>
    <div class="card"><h3>Tirupati Balaji</h3><img id="img3" src="./public/images/tirupati_balaji.png" /></div>
    <div class="card"><h3>Meenakshi Amman</h3><img id="img4" src="./public/images/meenakshi_amman.png" /></div>
    <div class="card"><h3>Jagannath Puri</h3><img id="img5" src="./public/images/jagannath_puri.png" /></div>
    <div class="card"><h3>Sun Temple Konark</h3><img id="img6" src="./public/images/sun_temple_konark.png" /></div>
    <div class="card"><h3>Brihadeeswarar</h3><img id="img7" src="./public/images/brihadeeswarar.png" /></div>
    <div class="card"><h3>Golden Temple</h3><img id="img8" src="./public/images/golden_temple.png" /></div>
    <div class="card"><h3>Somnath</h3><img id="img9" src="./public/images/somnath.png" /></div>
  </div>
</body>
</html>
